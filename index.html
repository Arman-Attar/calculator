<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gloria+Hallelujah&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="frame">
        <div class="calculator-display">
            <div class="top-display"></div>
            <div class="bottom-display">0</div>
        </div>
        <div class="first-row">
            <button class="7">7</button>
            <button class="8">8</button>
            <button class="9">9</button>
            <button class="add">+</button>
        </div>
        <div class="second-row">
            <button class="4">4</button>
            <button class="5">5</button>
            <button class="6">6</button>
            <button class="subtract">-</button>
        </div>
        <div class="third-row">
            <button class="1">1</button>
            <button class="2">2</button>
            <button class="3">3</button>
            <button class="multiply">*</button>
        </div>
        <div class="fourth-row">
            <button class="clear">C</button>
            <button class="0">0</button>
            <button class="equal">=</button>
            <button class="divide">/</button>
        </div>
    </div>
</body>
</html>
